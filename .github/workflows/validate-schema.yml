name: Validate Mission Schema
on:
  pull_request:
    branches: [master]
    paths:
      - 'fixes/**'
      - 'runbooks/**'
  push:
    branches: [master]
    paths:
      - 'fixes/**'
      - '!fixes/index.json'
      - 'runbooks/**'
  schedule:
    - cron: '30 5 * * 1'  # Weekly Monday 5:30am UTC
  workflow_dispatch:

permissions: read-all  # default read; no writes needed

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm ci
      - name: Find changed files (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'fixes/**/*.json' 'fixes/**/*.yaml' 'fixes/**/*.yml' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
      - name: Validate schema (PR — changed files only)
        if: github.event_name == 'pull_request' && steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/validate-schema.mjs "$CHANGED_FILES"
      - name: Validate schema (push/schedule/dispatch — all files)
        if: github.event_name != 'pull_request'
        run: node scripts/validate-schema.mjs --all
