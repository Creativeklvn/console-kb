name: Scan Mission Files
on:
  pull_request:
    branches: [master]
    paths:
      - 'fixes/**'
      - 'runbooks/**'
  push:
    branches: [master]
    paths:
      - 'fixes/**'
      - '!fixes/index.json'
      - 'runbooks/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6:00am UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install --no-audit
      - name: Find changed files (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'fixes/**/*.json' 'fixes/**/*.yaml' 'fixes/**/*.yml' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "count=$(echo $FILES | wc -w | tr -d ' ')" >> $GITHUB_OUTPUT
      - name: Scan missions (PR — changed files only)
        if: github.event_name == 'pull_request' && steps.changed.outputs.count != '0'
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/scan-pr.mjs $CHANGED_FILES
      - name: Scan missions (push/schedule/dispatch — all files)
        if: github.event_name != 'pull_request'
        run: node scripts/scan-pr.mjs --all
      - name: Post results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('scan-results.md')) {
              const body = fs.readFileSync('scan-results.md', 'utf8');
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
              } catch (err) {
                core.warning(`Could not post scan results (fork PRs have read-only tokens): ${err.message}`);
              }
            }
