name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions: read-all  # default read; writes scoped to job below

jobs:
  stale:
    permissions:
      issues: write
    uses: kubestellar/infra/.github/workflows/reusable-stale.yml@main
    secrets: inherit
