name: Build Mission Index

on:
  push:
    branches: [master]
    paths:
      - 'fixes/**'
      - '!fixes/index.json'
      - 'runbooks/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Build mission index
        run: node scripts/build-index.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet fixes/index.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push index
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixes/index.json
          git commit -s -m "🌱 Auto-update mission index"
          git push
