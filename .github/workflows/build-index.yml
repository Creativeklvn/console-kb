name: Build Mission Index

on:
  push:
    branches: [master]
    paths:
      - 'fixes/**'
      - '!fixes/index.json'
      - 'runbooks/**'
  workflow_dispatch:

permissions: read-all  # default read; writes scoped to job below

jobs:
  build-index:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Build mission index
        run: node scripts/build-index.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet fixes/index.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push index
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixes/index.json
          git commit -s -m "🌱 Auto-update mission index"
          git push
